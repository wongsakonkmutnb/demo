<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>หน้าแรก - ระบบห้องสมุด</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">📚 ห้องสมุดออนไลน์</a>
            <div class="navbar-nav">
                <a class="nav-link active" href="/">หน้าแรก</a>
                <a class="nav-link" href="/history">ประวัติการยืม</a>
                <a class="nav-link text-warning" href="/admin/books">ผู้ดูแลระบบ</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h2 class="mb-4 text-center">ค้นหาหนังสือ</h2>
        
        <form th:action="@{/}" method="get" class="d-flex justify-content-center mb-5">
            <input type="text" name="keyword" class="form-control w-50 me-2" placeholder="พิมพ์ชื่อหนังสือที่ต้องการค้นหา...">
            <button type="submit" class="btn btn-outline-primary">🔍 ค้นหา</button>
        </form>

        <div class="row">
            <div class="col-md-4 mb-4" th:each="book : ${books}">
                <div class="card h-100 shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title text-primary" th:text="${book.title}">ชื่อหนังสือ</h5>
                        <p class="card-text text-muted" th:text="'ผู้แต่ง: ' + ${book.author}">ผู้แต่ง</p>
                        <p class="card-text">คงเหลือ: <strong th:text="${book.availableCopies}">0</strong> เล่ม</p>
                    </div>
                    <div class="card-footer bg-white border-top-0">
                        <form th:action="@{/borrow/{id}(id=${book.id})}" method="post" th:if="${book.availableCopies > 0}">
                            <button type="submit" class="btn btn-success w-100">ยืมหนังสือ</button>
                        </form>
                        <button class="btn btn-secondary w-100" th:if="${book.availableCopies == 0}" disabled>หนังสือหมด</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
