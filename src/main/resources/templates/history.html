<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ประวัติการยืม - ระบบห้องสมุด</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">📚 ห้องสมุดออนไลน์</a>
            <div class="navbar-nav">
                <a class="nav-link" href="/">หน้าแรก</a>
                <a class="nav-link active" href="/history">ประวัติการยืม</a>
                <a class="nav-link text-warning" href="/admin/books">ผู้ดูแลระบบ</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h2 class="mb-4">ประวัติการยืม-คืนของคุณ</h2>
        
        <table class="table table-bordered table-hover bg-white shadow-sm">
            <thead class="table-dark">
                <tr>
                    <th>ชื่อหนังสือ</th>
                    <th>วันที่ยืม</th>
                    <th>วันที่คืน</th>
                    <th>สถานะ</th>
                    <th>จัดการ</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="record : ${records}">
                    <td th:text="${record.book.title}"></td>
                    <td th:text="${record.borrowDate}"></td>
                    <td th:text="${record.returnDate != null ? record.returnDate : '-'}"></td>
                    <td>
                        <span class="badge bg-warning text-dark" th:if="${record.status == 'BORROWED'}">กำลังยืม</span>
                        <span class="badge bg-success" th:if="${record.status == 'RETURNED'}">คืนแล้ว</span>
                    </td>
                    <td>
                        <form th:action="@{/return/{id}(id=${record.id})}" method="post" th:if="${record.status == 'BORROWED'}">
                            <button type="submit" class="btn btn-sm btn-danger">คืนหนังสือ</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</body>
</html>
